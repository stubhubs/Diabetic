
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Diabetic Test | Book Your Appointment Today</title>
    <style>
        /* CSS Variables based on the Ad Image */
        :root {
            --brand-blue: #0A4B82;
            --brand-light-blue: #EAF3FA;
            --brand-green: #29A81E;
            --brand-green-hover: #1f8515;
            --text-main: #333333;
            --text-muted: #666666;
            --white: #ffffff;
        }

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            color: var(--text-main);
            background-color: var(--brand-light-blue);
            line-height: 1.6;
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header / Top Banner */
        .header-banner {
            background-color: var(--brand-blue);
            color: var(--white);
            text-align: center;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Main Split Section */
        .main-wrapper {
            display: flex;
            flex-wrap: wrap;
            background-color: var(--white);
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Image Column */
        .image-col {
            flex: 1 1 50%;
            background-image: url('2026.png'); /* Replace with your actual image */
            background-size: cover;
            background-position: center;
            min-height: 400px;
        }

        /* Content Column */
        .content-col {
            flex: 1 1 50%;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .content-col h1 {
            color: var(--brand-blue);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .calendar-icon {
            font-size: 3rem;
            color: var(--brand-blue);
            margin-bottom: 20px;
        }

        /* Call To Action Button */
        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #42D835 0%, var(--brand-green) 100%);
            color: var(--white);
            text-decoration: none;
            padding: 18px 40px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.2);
            border: 2px solid var(--white);
            margin: 30px 0;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 400px;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .phone-icon {
            margin-right: 15px;
            font-size: 2rem;
        }

        /* Phone Number Text */
        .phone-number {
            color: var(--brand-blue);
            font-size: 2.8rem;
            font-weight: bold;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .toll-free {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .speak-team {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        /* Trust Badge */
        .trust-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: var(--text-main);
        }

        .shield-icon {
            color: var(--brand-blue);
            font-size: 1.8rem;
            margin-right: 10px;
        }
        
        .plus-icon {
            background-color: var(--brand-blue);
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            font-weight: bold;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .main-wrapper {
                flex-direction: column;
            }
            .image-col {
                min-height: 300px;
            }
            .content-col {
                padding: 30px 20px;
            }
            .phone-number {
                font-size: 2.2rem;
            }
            .cta-button {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <div class="header-banner">
        FREE DIABETIC TEST
    </div>

    <div class="container">
        <div class="main-wrapper">
            
            <div class="image-col">
                </div>

            <div class="content-col">
                
                <div class="calendar-icon">📅</div>
                
                <h1>Book Your<br>Appointment<br>Today.</h1>

                <a href="tel:18052631274" class="cta-button">
                    <span class="phone-icon">📞</span> CALL NOW
                </a>

                <div class="phone-number">1-805-263-1274</div>
                <div class="toll-free">Toll-Free</div>
                <div class="speak-team">Speak to our team.</div>

                <div class="trust-badge">
                    <span class="shield-icon">🛡️</span> 
                    Trusted Care 
                    <span class="plus-icon">+</span>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
